name: Deploy Backend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Deploying Backend"

            cd /var/www/mycafiles_backend

            git fetch origin
            git reset --hard origin/master

            npm install

            pm2 reload backend || pm2 start npm --name backend -- start

            echo "✅ Backend Done"