name: Deploy Backend

on:
  pull_request:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Deploying Backend"

            cd /var/www/mycafiles_backend

            git fetch origin
            git reset --hard origin/master

            npm install

            pm2 reload mycafiles-api || pm2 start npm --name mycafiles-api -- start

            echo "✅ Backend Done"